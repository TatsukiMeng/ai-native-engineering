name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "docs/**"
      - ".github/workflows/pr-checks.yml"

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install deps (docs)
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: docs
        run: bun run types:check

      - name: Build static export
        working-directory: docs
        run: bun run build

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install deps (docs)
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: docs
        run: bun run lint

      - name: Format check
        working-directory: docs
        run: bun run format:check
